<!-- SWC26 Flipbook - Salesforce HTML Editor -->
<!-- STEP 1: Replace SLIDE_URL_1 to SLIDE_URL_38 with your Salesforce image URLs -->
<!-- STEP 2: Replace YOUR_PDF_URL with your Salesforce PDF link -->

<div id="swc-flipbook" style="font-family:sans-serif;max-width:800px;margin:0 auto"></div>
<script>
(function(){
  var SLIDES = [
    'SLIDE_URL_1','SLIDE_URL_2','SLIDE_URL_3','SLIDE_URL_4','SLIDE_URL_5',
    'SLIDE_URL_6','SLIDE_URL_7','SLIDE_URL_8','SLIDE_URL_9','SLIDE_URL_10',
    'SLIDE_URL_11','SLIDE_URL_12','SLIDE_URL_13','SLIDE_URL_14','SLIDE_URL_15',
    'SLIDE_URL_16','SLIDE_URL_17','SLIDE_URL_18','SLIDE_URL_19','SLIDE_URL_20',
    'SLIDE_URL_21','SLIDE_URL_22','SLIDE_URL_23','SLIDE_URL_24','SLIDE_URL_25',
    'SLIDE_URL_26','SLIDE_URL_27','SLIDE_URL_28','SLIDE_URL_29','SLIDE_URL_30',
    'SLIDE_URL_31','SLIDE_URL_32','SLIDE_URL_33','SLIDE_URL_34','SLIDE_URL_35',
    'SLIDE_URL_36','SLIDE_URL_37','SLIDE_URL_38'
  ];
  var PDF_URL = 'YOUR_PDF_URL';
  var spread=0, animating=false;
  var total=SLIDES.length, spreads=Math.ceil(total/2);
  var el=document.getElementById('swc-flipbook');

  var css = '<style>' +
    '.sfb-stage{background:#f0ede8;border-radius:10px;padding:1.5rem 1rem;display:flex;flex-direction:column;align-items:center;gap:1rem}' +
    '.sfb-book{position:relative;width:100%;max-width:660px;height:400px;perspective:2000px;display:flex;align-items:center}' +
    '.sfb-left,.sfb-right{width:50%;height:100%;overflow:hidden;background:#fff}' +
    '.sfb-left{border-radius:4px 0 0 4px;border:1px solid #d1cdc7;border-right:none;cursor:pointer}' +
    '.sfb-right{border-radius:0 4px 4px 0;border:1px solid #d1cdc7;border-left:none;cursor:pointer}' +
    '.sfb-spine{width:3px;background:#d1cdc7;align-self:stretch;flex-shrink:0}' +
    '.sfb-left img,.sfb-right img{width:100%;height:100%;object-fit:contain}' +
    '.sfb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#ddd;font-weight:500}' +
    '.sfb-overlay{position:absolute;top:0;height:100%;width:50%;transform-style:preserve-3d;pointer-events:none;z-index:10;display:none}' +
    '.sfb-of,.sfb-ob{position:absolute;inset:0;backface-visibility:hidden;background:#fff;border:1px solid #d1cdc7;overflow:hidden}' +
    '.sfb-ob{transform:rotateY(180deg)}' +
    '.sfb-of img,.sfb-ob img{width:100%;height:100%;object-fit:contain}' +
    '@keyframes sfbFwd{0%{transform:rotateY(0)}100%{transform:rotateY(-180deg)}}' +
    '@keyframes sfbBk{0%{transform:rotateY(-180deg)}100%{transform:rotateY(0)}}' +
    '.sfb-controls{display:flex;align-items:center;gap:12px}' +
    '.sfb-btn{background:#fff;border:1px solid #d1cdc7;border-radius:6px;padding:7px 18px;font-size:13px;cursor:pointer}' +
    '.sfb-btn:disabled{opacity:.3;cursor:not-allowed}' +
    '.sfb-ctr{font-size:13px;color:#6b7280;min-width:90px;text-align:center}' +
    '.sfb-prog{width:100%;max-width:660px;height:2px;background:#d1cdc7;border-radius:2px;overflow:hidden}' +
    '.sfb-fill{height:2px;background:#6b6560;border-radius:2px;transition:width .4s}' +
    '.sfb-dl{font-size:13px;color:#374151;text-decoration:none;border:1px solid #d1cdc7;border-radius:6px;padding:6px 14px;background:#fff;display:inline-flex;align-items:center;gap:5px}' +
    '</style>';

  el.innerHTML = css +
    '<div style="text-align:center;margin-bottom:1rem">' +
    '<div style="font-size:17px;font-weight:500;color:#1f2937">SWC26 Game Plan</div>' +
    '<div style="font-size:12px;color:#9ca3af;margin-top:3px">Click the page edges or use arrows to flip</div></div>' +
    '<div class="sfb-stage">' +
    '<div class="sfb-book" id="sfb-book">' +
    '<div class="sfb-left" id="sfb-l" onclick="sfbNav(-1)"><div id="sfb-lc"></div></div>' +
    '<div class="sfb-spine"></div>' +
    '<div class="sfb-right" id="sfb-r" onclick="sfbNav(1)"><div id="sfb-rc"></div></div>' +
    '<div class="sfb-overlay" id="sfb-ov"><div class="sfb-of" id="sfb-of"></div><div class="sfb-ob" id="sfb-ob"></div></div>' +
    '</div>' +
    '<div class="sfb-controls">' +
    '<button class="sfb-btn" id="sfb-prev" onclick="sfbNav(-1)" disabled>&#8592; Prev</button>' +
    '<span class="sfb-ctr" id="sfb-ctr">Pages 1 – 2</span>' +
    '<button class="sfb-btn" id="sfb-next" onclick="sfbNav(1)">Next &#8594;</button>' +
    '</div>' +
    '<div class="sfb-prog"><div class="sfb-fill" id="sfb-fill" style="width:5%"></div></div>' +
    '<a class="sfb-dl" href="'+PDF_URL+'" target="_blank">&#8595; Download PDF</a>' +
    '</div>';

  function img(n){ return n<=total?'<img src="'+SLIDES[n-1]+'" alt="Slide '+n+'">':'<div class="sfb-ph">&#8203;</div>'; }
  function render(s){
    var lp=s*2+1, rp=s*2+2;
    document.getElementById('sfb-lc').innerHTML=img(lp);
    document.getElementById('sfb-rc').innerHTML=rp<=total?img(rp):'<div class="sfb-ph">End</div>';
    document.getElementById('sfb-ctr').textContent=rp<=total?'Pages '+lp+' \u2013 '+Math.min(rp,total):'Page '+lp;
    document.getElementById('sfb-prev').disabled=s===0;
    document.getElementById('sfb-next').disabled=s>=spreads-1;
    document.getElementById('sfb-fill').style.width=Math.round(((s+1)/spreads)*100)+'%';
  }

  window.sfbNav=function(dir){
    if(animating)return;
    var next=spread+dir;
    if(next<0||next>=spreads)return;
    animating=true;
    var ov=document.getElementById('sfb-ov');
    var of=document.getElementById('sfb-of');
    var ob=document.getElementById('sfb-ob');
    if(dir===1){
      of.innerHTML=img(spread*2+2);
      ob.innerHTML=img(next*2+1);
      ov.style.left='50%';ov.style.transformOrigin='left center';
      ov.style.display='block';
      ov.style.animation='sfbFwd .55s cubic-bezier(.645,.045,.355,1) forwards';
    } else {
      of.innerHTML=img(spread*2+1);
      ob.innerHTML=img(next*2+2);
      ov.style.left='0';ov.style.transformOrigin='right center';
      ov.style.display='block';
      ov.style.animation='sfbBk .55s cubic-bezier(.645,.045,.355,1) forwards';
    }
    setTimeout(function(){
      spread=next;render(spread);
      ov.style.display='none';ov.style.animation='';
      animating=false;
    },560);
  };

  render(0);
})();
</script>
